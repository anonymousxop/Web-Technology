<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <title>Student Table</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 2px solid black;
            padding: 10px;
            vertical-align: top;
        }

        th {
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <tr>
        <th>Sr. No</th>
        <th>Student Name</th>
        <th>Phone No.</th>
        <th colspan="2">Course Enrolled</th>
    </tr>

    <tr>

    </tr>
    <tr>

    </tr>

    <!-- Row 2 -->

</html>
