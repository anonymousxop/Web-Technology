<!DOCTYPE html>
<html>
<head>
    <title>Animal Picture</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        /* Main Outer Border */
        .main-container {
            width: 80%;
            margin: 40px auto;
            padding: 20px;
            border: 3px solid black;
            border-radius: 20px;
            background-color: white;
        }

        h1 {
            text-align: center;
        }

        /* NEW BORDER that holds both cards */
        .cards-wrapper {
            border: 3px solid black;   /* New Border */
            padding: 20px;
            margin-top: 20px;
            border-radius: 15px;
        }

        /* Cards container */
        .card-container {
            display: flex;
            justify-content: center;
            gap: 30px;   /* Space between My Pet & Fav Pet */
        }

        /* Each Card */
        .card {
            width: 40%;
            padding: 15px;
            border: 2px solid black;
            border-radius: 15px;
            text-align: center;
        }

        .card img {
            width: 100%;
            height: auto;
            border: 2px solid black;
            border-radius: 10px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="main-container">
    <h1>Animal Picture</h1>

    <!-- NEW BORDER WRAPPER -->
    <div class="cards-wrapper">

        <div class="card-container">
            
            <div class="card">
                <h2>My Pet</h2>
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQZl1B-iS1VDit60FPpERihwXW2prvm_JKDAg&s" alt="Pet Picture">
            </div>

            <div class="card">
                <h2>My Favorite Pet</h2>
                <img src="https://phoneky.co.uk/thumbs/wallpapers/p2ls/animals/49/f00137f012892408.jpg" alt="Favorite Pet">
            </div>

        </div>

    </div>

</div>

</body>
</html>
