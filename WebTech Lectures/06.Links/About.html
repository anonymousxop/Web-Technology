<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML Marquee Example</title>
</head>
<body>

    <h1>HTML Marquee Example</h1>

    <!-- Scrolling Text Left to Right -->
    <marquee behavior="scroll" direction="left" scrollamount="5" bgcolor="#f2f2f2" width="80%">
        Welcome to our website! Learn HTML, CSS, and JavaScript.
    </marquee>

    <br><br>

    <!-- Scrolling Text Up -->
    <marquee behavior="scroll" direction="up" height="100px" scrollamount="2" style="border:1px solid #000;">
        Latest News: HTML tags like map and marquee are fun to learn!
    </marquee>

</body>
</html>
