<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selector</title>
    <style>
        p{
            color:red;
        }
        #para1
        {
            background-color: lightblue;
            text-align: center;
        }
        .header {
    width: 100px;
    height: 100px;
    background-color: red;
}
h3,p
{
    font-family: Arial, Helvetica, sans-serif;
}
*{
    background-color: yellow;
}
div>h4{
    border: solid;
}
    </style>
</head>
<body>
    <p >element selector para 1</p>
    <p>element selector para 2</p>

    <p id = "para1">Id selector</p>
    <div id = "para1">
        this is a div
      <h3>this is a div</h3>
    </div>

    <div class = "header">
        this is a use class
      <h3>this is a div</h3>
    </div>
    <div>
        <h4>child</h4>
        <h4>child</h4>
        <h4>child</h4>
    </div>


    <h2>CSS Attribute Selector Example</h2>

<!-- Has attribute -->
<input type="text" placeholder="Enter name" required>
<input type="text" placeholder="Optional name">

<br><br>

<!-- Exact value -->
<input type="text" placeholder="Username">
<input type="password" placeholder="Password">

<br><br>

<!-- Starts with -->
<a href="https://google.com">Google Link</a><br>
<a href="http://example.com">Example Link</a>

<br><br>

<!-- Ends with -->
<img src="image2.png" alt="PNG Image" width="100">
<img src="photo.jpg" alt="JPG Image" width="100">
</body>
</html>
