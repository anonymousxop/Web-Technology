<!DOCTYPE html>
<html>
<head>
<style>
/* Style for floated boxes */
.box {
    float: left;
    width: 100px;
    height: 50px;
    margin: 10px;
    border: 3px solid #73AD21;
    text-align: center;
    line-height: 50px;
    background-color: #f0f0f0;
}
img:hover {
    opacity: 0.5;
}

/* Clearfix class to stop floating */
.clearfix {
    clear: both;
}

.menu {
    list-style: none;
    padding: 0;
    margin: 0;
    background-color: #333;
}

.menu li {
    display: inline-block;
    position: relative;
}

.menu li a {
    color: white;
    padding: 10px 15px;
    text-decoration: none;
    display: block;
}
</style>
</head>
<body>

<h2>Without clear</h2>
<div class="box">Box 1</div>
<p>This paragraph appears next to the floated box because we didn't clear it.</p>

<h2>With clear</h2>
<div class="box">Box 2</div>
<div class="clearfix"></div> <!-- This clears the float -->
<p>This paragraph appears below the floated box because we used clear.</p>

</html>
